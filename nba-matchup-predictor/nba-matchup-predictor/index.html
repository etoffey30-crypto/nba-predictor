<!DOCTYPE html>
<!-- Deployment Trigger: 2026-03-26 18:40 UTC -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Analytics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dark-theme">
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div>
                    <h1>NBA Matchup Predictor</h1>
                    <p>Advanced Deep Analysis & AI Outcomes</p>
                </div>
                <button id="helpBtn" class="glass-btn">How it Works <span style="margin-left: 5px;">❔</span></button>
            </div>
        </header>

        <!-- Help Modal -->
        <div id="helpModal" class="modal">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2>AI Prediction Guide</h2>
                    <span class="close-btn">&times;</span>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content populated by JS -->
                </div>
            </div>
        </div>

        <main>
            <section class="overview-grid">
                <div class="card glass">
                    <h3>Elo Rating Trends</h3>
                    <div class="chart-container">
                        <canvas id="eloChart"></canvas>
                    </div>
                </div>

                <div class="card glass">
                    <h3>Team Efficiency (ORtg vs DRtg)</h3>
                    <div class="chart-container">
                        <canvas id="efficiencyChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="upcoming-section card glass" style="margin-bottom: 2rem;">
                <div class="predictor-header" style="margin-bottom: 1.5rem;">
                    <h2>Match Center</h2>
                    <div class="filter-tabs">
                        <button class="filter-btn active" data-filter="upcoming">Upcoming</button>
                        <button class="filter-btn" data-filter="live">Live Now</button>
                        <button class="filter-btn" data-filter="finished">Recent Results</button>
                    </div>
                </div>
                <div id="upcomingMatches" class="upcoming-grid">
                    <!-- Populated by JS -->
                </div>
            </section>

            <section class="predictor-section card glass">
                <div class="predictor-header">
                    <h2>Matchup Predictor</h2>
                    <div class="market-tabs">
                        <button class="tab-btn active" data-tab="main">Main Markets</button>
                        <button class="tab-btn" data-tab="factors">Four Factors (Scientific)</button>
                        <button class="tab-btn" data-tab="quarters">Quarters / Halves</button>
                        <button class="tab-btn" data-tab="players">Player Props</button>
                    </div>
                </div>

                <div class="predictor-controls">
                    <div class="team-select">
                        <label for="teamA">Team A (Home)</label>
                        <select id="teamA"></select>
                    </div>
                    <div class="vs">VS</div>
                    <div class="team-select">
                        <label for="teamB">Team B (Away)</label>
                        <select id="teamB"></select>
                    </div>
                </div>

                <div id="predictionResult" class="prediction-result">
                    <div class="placeholder-text">Select teams to see prediction</div>
                </div>
            </section>
        </main>
    </div>
    <script src="data.js?v=20260330-1"></script>
    <script src="dashboard.js?v=20260330-1"></script>
</body>

</html>
